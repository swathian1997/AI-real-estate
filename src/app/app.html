
<div class="bg-gradient-to-b from-black via-gray-900 to-black min-h-screen text-white">
<!-- {{ properties | json }} -->
  <nav class="flex items-center justify-between px-8 py-5 backdrop-blur-lg bg-white/5 border-b border-white/10 sticky top-0 z-50">
    <h1 class="text-2xl font-bold text-green-400">EstateAI</h1>

    <ul class="hidden md:flex gap-6 text-gray-300 font-medium">
      <li class="hover:text-green-400 cursor-pointer">Home</li>
      <li class="hover:text-green-400 cursor-pointer">Properties</li>
      <li class="hover:text-green-400 cursor-pointer">About</li>
      <li class="hover:text-green-400 cursor-pointer">Contact</li>
    </ul>

    <button class="md:hidden text-3xl text-green-400">☰</button>
  </nav>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-10">

  <div
    *ngFor="let property of properties"
    class="bg-gray-900 rounded-2xl overflow-hidden shadow-lg hover:scale-105 transition duration-300"
  >

    <img
      [src]="property.image"
      class="h-64 w-full object-cover bg-gray-800"
    />

    <div class="p-6">

      <h3 class="text-2xl font-bold">
        {{ property.title }}
      </h3>

      <p class="text-gray-400 mt-2">
        {{ property.location }}
      </p>

      <p class="text-green-400 text-xl font-semibold mt-4">
        {{ property.price }}
      </p>

    </div>

  </div>

</div>

  

  <footer class="border-t border-white/10 py-8 text-center text-gray-400">
    <h2 class="text-2xl font-bold text-green-400 mb-3">EstateAI</h2>
    <p>AI Powered Real Estate Platform</p>
  </footer>

  <button
    class="fixed bottom-6 right-6 bg-green-400 text-black w-16 h-16 rounded-full shadow-2xl text-2xl hover:scale-110 transition duration-300 animate-bounce"
  >
    🤖
  </button>

  <app-chatbot></app-chatbot>
</div>
